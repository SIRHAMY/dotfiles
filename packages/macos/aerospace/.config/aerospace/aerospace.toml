# ~/.config/aerospace/aerospace.toml
after-login-command = []
after-startup-command = []
start-at-login = true

enable-normalization-flatten-containers = true

# Notify SketchyBar so the workspace pills refresh. `command -v` guards the Mac
# without sketchybar installed (e.g. MDM-blocked) — AeroSpace shouldn't error
# on every workspace switch in that case.
exec-on-workspace-change = ['/bin/bash', '-c',
    'command -v sketchybar >/dev/null && sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE || true'
]

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

automatically-unhide-macos-hidden-apps = false

# Ghostty uses macOS native tabs, which macOS exposes as separate windows to
# tiling WMs. Float those records so tabs don't consume extra tile slots.
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['layout floating']

# Reserve 28px at the top so tiled windows don't sit under SketchyBar.
# Must match the `--bar height` in sketchybar/.config/sketchybar/sketchybarrc.
[gaps]
outer.top = 28

[mode.main.binding]
# Directional focus. Uses cmd-alt instead of plain alt to avoid colliding
# with zellij's Alt+hjkl pane/tab navigation — terminal multiplexer wins
# the bare-alt chord on Mac, mirroring how sway uses Super (not Alt) for
# window focus.
cmd-alt-h = 'focus left'
cmd-alt-j = 'focus down'
cmd-alt-k = 'focus up'
cmd-alt-l = 'focus right'

# Move focused container directionally (mirrors sway $mod+Ctrl+h/j/k/l)
alt-ctrl-h = 'move left'
alt-ctrl-j = 'move down'
alt-ctrl-k = 'move up'
alt-ctrl-l = 'move right'

# Move workspace to prev/next monitor (mirrors sway $mod+Shift+h/l)
# AeroSpace orders monitors left-to-right; j/k (down/up) skipped — no
# vertical-monitor support in move-workspace-to-monitor.
alt-shift-h = 'move-workspace-to-monitor --wrap-around prev'
alt-shift-l = 'move-workspace-to-monitor --wrap-around next'

# Workspaces 1-10 (alt-0 = workspace 10; mirrors sway $mod+0)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Workspaces 11-20 (alt-shift-N; mirrors sway $mod+Shift+N for the teens)
alt-shift-1 = 'workspace 11'
alt-shift-2 = 'workspace 12'
alt-shift-3 = 'workspace 13'
alt-shift-4 = 'workspace 14'
alt-shift-5 = 'workspace 15'
alt-shift-6 = 'workspace 16'
alt-shift-7 = 'workspace 17'
alt-shift-8 = 'workspace 18'
alt-shift-9 = 'workspace 19'
alt-shift-0 = 'workspace 20'

# Move focused container to workspace 1-20 (alt-ctrl-N; mirrors sway $mod+Ctrl+N)
alt-ctrl-1 = 'move-node-to-workspace 1'
alt-ctrl-2 = 'move-node-to-workspace 2'
alt-ctrl-3 = 'move-node-to-workspace 3'
alt-ctrl-4 = 'move-node-to-workspace 4'
alt-ctrl-5 = 'move-node-to-workspace 5'
alt-ctrl-6 = 'move-node-to-workspace 6'
alt-ctrl-7 = 'move-node-to-workspace 7'
alt-ctrl-8 = 'move-node-to-workspace 8'
alt-ctrl-9 = 'move-node-to-workspace 9'
alt-ctrl-0 = 'move-node-to-workspace 10'

# Move focused container to workspace 11-20 (alt-ctrl-shift-N; mirrors sway $mod+Ctrl+Shift+N)
alt-ctrl-shift-1 = 'move-node-to-workspace 11'
alt-ctrl-shift-2 = 'move-node-to-workspace 12'
alt-ctrl-shift-3 = 'move-node-to-workspace 13'
alt-ctrl-shift-4 = 'move-node-to-workspace 14'
alt-ctrl-shift-5 = 'move-node-to-workspace 15'
alt-ctrl-shift-6 = 'move-node-to-workspace 16'
alt-ctrl-shift-7 = 'move-node-to-workspace 17'
alt-ctrl-shift-8 = 'move-node-to-workspace 18'
alt-ctrl-shift-9 = 'move-node-to-workspace 19'
alt-ctrl-shift-0 = 'move-node-to-workspace 20'

alt-shift-q = 'close'
alt-shift-c = 'reload-config'
alt-f       = 'fullscreen'

# Reset layout: flatten any nested containers (left over after closing windows
# or interactive resizes) and equalize sibling sizes. AeroSpace has no
# on-window-close hook, so weights from a prior 3-window split persist after
# closing one — this is the manual rebalance.
alt-shift-r = ['flatten-workspace-tree', 'balance-sizes']
