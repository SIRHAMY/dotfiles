# ~/.config/aerospace/aerospace.toml
after-login-command = []
after-startup-command = []
start-at-login = true

enable-normalization-flatten-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

automatically-unhide-macos-hidden-apps = false

[mode.main.binding]
# Directional focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move container
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces 1-10 (alt-0 = workspace 10; mirrors sway $mod+0)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Workspaces 11-20 (alt-shift-N; mirrors sway $mod+Shift+N for the teens)
alt-shift-1 = 'workspace 11'
alt-shift-2 = 'workspace 12'
alt-shift-3 = 'workspace 13'
alt-shift-4 = 'workspace 14'
alt-shift-5 = 'workspace 15'
alt-shift-6 = 'workspace 16'
alt-shift-7 = 'workspace 17'
alt-shift-8 = 'workspace 18'
alt-shift-9 = 'workspace 19'
alt-shift-0 = 'workspace 20'

# Move focused container to workspace 1-20 (alt-ctrl-N; mirrors sway $mod+Ctrl+N)
alt-ctrl-1 = 'move-node-to-workspace 1'
alt-ctrl-2 = 'move-node-to-workspace 2'
alt-ctrl-3 = 'move-node-to-workspace 3'
alt-ctrl-4 = 'move-node-to-workspace 4'
alt-ctrl-5 = 'move-node-to-workspace 5'
alt-ctrl-6 = 'move-node-to-workspace 6'
alt-ctrl-7 = 'move-node-to-workspace 7'
alt-ctrl-8 = 'move-node-to-workspace 8'
alt-ctrl-9 = 'move-node-to-workspace 9'
alt-ctrl-0 = 'move-node-to-workspace 10'

alt-shift-q = 'close'
alt-shift-c = 'reload-config'
alt-f       = 'fullscreen'
